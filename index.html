<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>You're Invited!</h1>
    <p class="description">Join us to celebrate our special day!</p>
    
    <div class="details">
      <p><strong>Date:</strong> December 25, 2024</p>
      <p><strong>Time:</strong> 3:00 PM</p>
      <p><strong>Location:</strong> Grand Wedding Hall, Seoul</p>
    </div>
    
    <div class="rsvp">
      <p>Please RSVP by December 10, 2024</p>
      <button onclick="alert('Thank you for your RSVP!')">RSVP Now</button>
    </div>
  </div>
</body>
</html>
